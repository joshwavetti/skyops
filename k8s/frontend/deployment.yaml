apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: skyopsacrdev001.azurecr.io/frontend:ebbbee096daec016d646771e83079aaf717db881
        ports:
        - containerPort: 80