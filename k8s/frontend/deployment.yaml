apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: skyopsacrdev001.azurecr.io/frontend:c36a94c0a9f94c8d6da29bd5a2bcb33d92100d52
        ports:
        - containerPort: 80