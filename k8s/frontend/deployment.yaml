apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: skyopsacrdev001.azurecr.io/frontend:cbfddc9f0ea62a0f92ee8fb83c189b8b3ba06f04
        ports:
        - containerPort: 80