name: SkyOps CI/CD

on:
  push:
    branches: [ main ]

env:
  ACR_LOGIN_SERVER: skyopsacrdev001.azurecr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      uses: docker/login-action@v2
      with:
        registry: skyopsacrdev001.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Set image tag
      run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

    - name: Build and push WeatherApi
      uses: docker/build-push-action@v4
      with:
        context: ./src/WeatherApi
        push: true
        tags: skyopsacrdev001.azurecr.io/weather-api:${{ env.IMAGE_TAG }}

    - name: Build and push GatewayApi
      uses: docker/build-push-action@v4
      with:
        context: ./src/GatewayApi
        push: true
        tags: skyopsacrdev001.azurecr.io/gateway-api:${{ env.IMAGE_TAG }}

    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./src/Frontend
        push: true
        tags: skyopsacrdev001.azurecr.io/frontend:${{ env.IMAGE_TAG }}

    - name: Update Kubernetes manifests
      run: |
        sed -i "s|skyopsacrdev001.azurecr.io/weather-api:.*|skyopsacrdev001.azurecr.io/weather-api:${{ env.IMAGE_TAG }}|g" k8s/weather-api/deployment.yaml
        sed -i "s|skyopsacrdev001.azurecr.io/gateway-api:.*|skyopsacrdev001.azurecr.io/gateway-api:${{ env.IMAGE_TAG }}|g" k8s/gateway-api/deployment.yaml
        sed -i "s|skyopsacrdev001.azurecr.io/frontend:.*|skyopsacrdev001.azurecr.io/frontend:${{ env.IMAGE_TAG }}|g" k8s/frontend/deployment.yaml

    - name: Commit and push updated manifests
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add k8s/
        git commit -m "ci: update image tags to ${{ env.IMAGE_TAG }}"
        git push